name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    name: Rust (security spine)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Build
        run: cargo build --verbose
      - name: Test
        run: cargo test --verbose

  go:
    name: Go (networking)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Format check
        run: test -z "$(gofmt -l .)"
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./...

  python:
    name: Python (value + services)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Compile check
        run: python -m py_compile *.py
      - name: Tests
        run: |
          python tests/test_value.py
          python tests/test_services.py
          python tests/test_actions.py

  web3:
    name: Web3 (on-chain anchoring)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install web3 + in-process EVM
        run: pip install web3 eth-tester py-evm
      - name: On-chain anchoring test
        run: python tests/test_web3.py

  android:
    name: Android (Plan B app)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
      - name: Unit tests (pure value core)
        run: ./gradlew :app:testDebugUnitTest --no-daemon
      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --no-daemon
