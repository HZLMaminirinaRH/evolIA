name: CI

on:
  push:
  pull_request:

# Opt-in to Node.js 24 ahead of GitHub's 2026-06-16 forced switch, so any
# action still bundled on Node 20 runs on Node 24 today instead of breaking
# on the cut-off. Safe to remove once every action below is pinned to a
# version that already ships on Node 24 (Phase B).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  rust:
    name: Rust (security spine)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Build
        run: cargo build --verbose
      - name: Test
        run: cargo test --verbose

  go:
    name: Go (networking)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          # No cache: the module is stdlib-only (go.mod has zero require lines and
          # there is no go.sum), so the dependency cache has nothing to store and
          # setup-go's default cache step only logs "Dependencies file is not
          # found … Supported file pattern: go.mod" because it probes the repo
          # root, not go/. Disabling it removes that noise with no build cost.
          cache: false
      - name: Format check
        run: test -z "$(gofmt -l .)"
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./...

  python:
    name: Python (value + services)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Compile check
        run: python -m py_compile *.py
      - name: Tests
        run: |
          python tests/test_value.py
          python tests/test_services.py
          python tests/test_actions.py

  web3:
    name: Web3 (on-chain anchoring)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install web3 + in-process EVM
        run: pip install web3 eth-tester py-evm
      - name: On-chain anchoring test
        run: python tests/test_web3.py

  android:
    name: Android (Plan B app)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache: false # stdlib-only module, no go.sum — see the go job
      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
      - uses: android-actions/setup-android@v4
      - uses: gradle/actions/setup-gradle@v5
      - name: Cross-compile Go binaries into jniLibs (arm64)
        working-directory: ${{ github.workspace }}
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: bash scripts/build-android-binaries.sh
      - name: Unit tests (pure value core)
        run: ./gradlew :app:testDebugUnitTest --no-daemon
      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --no-daemon
      - name: Upload debug APK
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
